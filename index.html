<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLTV Match Predictor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo">&#x1F3AF; HLTV Match Predictor</div>
    <p class="subtitle">Predikce CS2 zapasu na zaklade statistik z HLTV</p>
    
    <nav class="tabs">
      <button class="tab active" data-tab="predictions">&#x1F4CA; Predikce</button>
      <button class="tab" data-tab="bracket">&#x1F3C6; Bracket</button>
      <button class="tab" data-tab="schedule">&#x1F4C5; Rozvrh</button>
      <button class="tab" data-tab="teams">&#x1F465; Tymy</button>
    </nav>
  </header>

  <main>
    <!-- Predikce Tab -->
    <section id="predictions-tab" class="tab-content active">
      <div class="controls">
        <button id="fetchBtn">&#x1F504; Nacist budouci zapasy</button>
        
        <div class="search-box">
          <input type="text" id="teamSearch" placeholder="&#x1F50D; Hledat tym..." />
        </div>
        
        <div class="filter-bar">
          <label>Filtr podle eventu:
            <select id="eventFilter"><option value="">Vsechny</option></select>
          </label>
          <label>Razeni:
            <select id="sortBy">
              <option value="confidence">Spolehlivost</option>
              <option value="time">Cas zapasu</option>
            </select>
          </label>
        </div>
      </div>

      <section id="loadingSection" class="loading hidden">
        <div class="spinner"></div>
        <p>Nacitam zapasy...</p>
      </section>

      <section id="matchesContainer" class="matches-grid"></section>

      <div id="errorBox" class="error-box hidden"></div>
    </section>

    <!-- Bracket Tab -->
    <section id="bracket-tab" class="tab-content">
      <div class="bracket-container">
        <h2>&#x1F3C6; Turnajovy Bracket</h2>
        <p class="bracket-info">Vizualizace turnajoveho pavouka a postupu tymu</p>
        <div id="bracketView" class="bracket-view">
          <!-- Bracket bude vykreslen JavaScriptem -->
        </div>
      </div>
    </section>

    <!-- Rozvrh Tab -->
    <section id="schedule-tab" class="tab-content">
      <div class="schedule-container">
        <h2>&#x1F4C5; Rozvrh Zapasu</h2>
        <div class="timeline">
          <div id="scheduleView" class="schedule-list">
            <!-- Rozvrh bude vykreslen JavaScriptem -->
          </div>
        </div>
      </div>
    </section>

    <!-- Tymy Tab -->
    <section id="teams-tab" class="tab-content">
      <div class="teams-container">
        <h2>&#x1F465; Databaze Tymu</h2>
        
        <div class="team-filters">
          <input type="text" id="teamSearchFull" placeholder="Vyhledat tym podle jmena..." />
          <select id="rankFilter">
            <option value="">Vsechny ranky</option>
            <option value="top5">Top 5</option>
            <option value="top10">Top 10</option>
            <option value="top20">Top 20</option>
          </select>
        </div>
        
        <div id="teamsGrid" class="teams-grid">
          <!-- Tymy budou vykresleny JavaScriptem -->
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>Data jsou nacitana pres HLTV API proxy &bull; Predikce jsou orientacni &bull; Created with &#x2764; for CS2 community</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
